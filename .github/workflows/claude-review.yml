name: Claude Auto-Review PR

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  # Step 1: GPT-5.4 独立 code review
  gpt-review:
    if: startsWith(github.head_ref, 'fix/issue-')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    outputs:
      verdict: ${{ steps.review.outputs.verdict }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} > /tmp/pr.diff
          echo "diff_size=$(wc -c < /tmp/pr.diff)" >> "$GITHUB_OUTPUT"

      - name: GPT-5.4 Code Review
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DIFF=$(cat /tmp/pr.diff | head -c 30000)
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY=$(echo "${{ github.event.pull_request.body }}" | head -c 3000)

          RESPONSE=$(curl -s https://aiberm.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "$(jq -n \
              --arg diff "$DIFF" \
              --arg title "$PR_TITLE" \
              --arg body "$PR_BODY" \
              '{
                "model": "gpt-5.4",
                "temperature": 0.3,
                "messages": [
                  {"role": "system", "content": "You are a senior Ruby code reviewer. Review the PR diff carefully. Focus on: correctness, edge cases, security, test coverage, and Ruby best practices. End your review with a verdict line: either \"VERDICT: APPROVE\" if the code is good, or \"VERDICT: REQUEST_CHANGES\" if issues need fixing."},
                  {"role": "user", "content": ("PR: " + $title + "\n\n" + $body + "\n\nDiff:\n```\n" + $diff + "\n```")}
                ]
              }')")

          REVIEW_BODY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Review failed: no response"')

          # 提取 verdict
          if echo "$REVIEW_BODY" | grep -qi "VERDICT: APPROVE"; then
            echo "verdict=approve" >> "$GITHUB_OUTPUT"
          else
            echo "verdict=request_changes" >> "$GITHUB_OUTPUT"
          fi

          # 发表 review 评论
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "$(printf '## 🤖 GPT-5.4 Code Review\n\n%s' "$REVIEW_BODY")"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Step 2: Claude 修复 review 发现的问题
  claude-fix:
    needs: gpt-review
    if: needs.gpt-review.outputs.verdict == 'request_changes'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Claude Fix Review Issues
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            A GPT-5.4 reviewer found issues with this PR. Read the latest review comment
            on PR #${{ github.event.pull_request.number }} and fix all the issues mentioned.

            After fixing:
            1. Run tests: bundle exec rspec
            2. Commit and push the fixes
          claude_args: "--model claude-opus-4-6-thinking --allowedTools Bash,Read,Write,Edit,Glob,Grep"
        env:
          ANTHROPIC_BASE_URL: "https://aiberm.com"

  # Step 3: 自动 merge（仅当 review 通过时）
  auto-merge:
    needs: gpt-review
    if: needs.gpt-review.outputs.verdict == 'approve'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Auto-merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "✅ GPT-5.4 review passed, merging..."
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --auto
