name: Claude Auto-Fix Issue

on:
  issues:
    types: [opened]

jobs:
  fix-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Claude Code Fix
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-opus-4-6-thinking
          direct_prompt: |
            You are working on ruby-mana, a Ruby gem that embeds LLMs as native Ruby constructs.

            GitHub Issue #${{ github.event.issue.number }}:
            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}

            Please:
            1. Analyze the issue and find relevant code
            2. Fix the bug or implement the feature
            3. Run tests: bundle exec rspec
            4. Commit changes referencing issue #${{ github.event.issue.number }}
            5. Create a PR to main that closes #${{ github.event.issue.number }}
            6. Comment on the issue with the PR link
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
        env:
          ANTHROPIC_BASE_URL: "https://aiberm.com"
